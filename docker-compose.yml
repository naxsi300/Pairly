# Pairly — production docker-compose stack.
#
# Requires: Docker Compose v2+ (`docker compose`, not the legacy
# `docker-compose` v1 Python tool). The `condition: service_completed_successfully`
# and `condition: service_healthy` keys below are v2-only; v1 silently ignores
# them and the deploy would race the init migration. We deliberately do NOT
# set a top-level `version:` field — Compose v2 deprecates it and warns.
# Run `docker compose version` to verify v2.x is installed.
#
# Usage:
#   1. Copy .env.prod.example to .env.prod and fill in (especially your domain).
#   2. `docker compose --env-file .env.prod build` — builds the api/bot image
#      (Dockerfile) AND the web image (Dockerfile.web, multi-stage: builds
#      miniapp/dist with node:22-alpine and bakes it into the Caddy image).
#   3. `docker compose --env-file .env.prod up -d`
#
# The init service runs migrations + QOTD seed once and exits; bring it up first.
# It binds the same SQLite volume so other services see the migrated DB.
#
# The Mini App's static assets are baked into the `web` (Caddy) image — there
# is NO host bind-mount of miniapp/dist. This eliminates the previous
# stale-dist / force-recreate / TLS-gap deploy failure mode (npm run build
# replaces dist atomically with new inodes; the bind-mount served stale bytes
# until the container was force-recreated).

services:
  init:
    build:
      context: .
      dockerfile: Dockerfile
    image: pairly:latest
    command: ["init"]
    env_file: .env.prod
    volumes:
      - pairly-data:/data
    restart: "no"

  api:
    image: pairly:latest
    depends_on:
      init:
        condition: service_completed_successfully
    command: ["api"]
    env_file: .env.prod
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - pairly-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    image: pairly:latest
    depends_on:
      init:
        condition: service_completed_successfully
    command: ["bot"]
    env_file: .env.prod
    # bot listens on PAIRLY_WEBHOOK_PORT (8080) for /telegram-webhook
    # only reachable from the web (Caddy) network (not published to host).
    expose:
      - "8080"
    volumes:
      - pairly-data:/data
    restart: unless-stopped

  web:
    # Caddy-based static + reverse-proxy tier. Built from Dockerfile.web
    # (multi-stage): node:22-alpine builds miniapp/dist, then caddy:2-alpine
    # runtime bakes /srv/miniapp into the image. The Caddyfile ships in the
    # same image — no host bind-mounts of either the Caddyfile or dist.
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
      bot:
        condition: service_started
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pairly-data:    # SQLite DB lives here for the default SQLite deploy.
  caddy_data:     # Let's Encrypt certs and ACME account.
  caddy_config:   # Caddy's runtime config cache.