name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (dev extras)
        run: uv sync --extra dev --python 3.12

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  miniapp:
    name: Mini App (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: miniapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: No-M3 guard
        run: bash miniapp/scripts/check-no-m3.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
