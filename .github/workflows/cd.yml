name: CD (disabled)

# Continuous deployment on tag. Disabled until VPS, deploy key, and secrets are wired.
# Until then this workflow is a no-op so it doesn't show up as "failing" in email
# notifications. To re-enable:
#   1. Provision VPS reachable via SSH
#   2. Add repo secrets DEPLOY_SSH_KEY / DEPLOY_HOST / DEPLOY_USER
#   3. Replace the `on:` block below and uncomment the `deploy:` job
#
# When ready, this workflow will SSH into the VPS on every `v*` tag push and
# re-run deploy/scripts/install.sh (idempotent).

on: workflow_dispatch  # never auto-triggers

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: CD is currently disabled
        run: |
          echo "CD workflow is disabled until VPS deploy secrets are configured."
          echo "See .github/workflows/cd.yml header for activation steps."